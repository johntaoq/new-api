name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend
        env:
          CI: ''
        run: |
          cd web
          bun install
          DISABLE_ESLINT_PLUGIN='true' bun run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build backend
        run: |
          go mod download
          go build ./...

      - name: Verify Docker image build
        uses: docker/setup-buildx-action@v3

      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: new-api-ci:${{ github.sha }}
