services:
  new-api:
    image: ${NEW_API_IMAGE}:${NEW_API_IMAGE_TAG}
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      - SQL_DSN=${SQL_DSN}
      - REDIS_CONN_STRING=${REDIS_CONN_STRING}
      - TZ=${TZ}
      - ERROR_LOG_ENABLED=${ERROR_LOG_ENABLED}
      - BATCH_UPDATE_ENABLED=${BATCH_UPDATE_ENABLED}
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING:-}
      - AZURE_STORAGE_ACCOUNT=${AZURE_STORAGE_ACCOUNT:-}
      - AZURE_STORAGE_KEY=${AZURE_STORAGE_KEY:-}
      - AZURE_STORAGE_CONTAINER=${AZURE_STORAGE_CONTAINER:-}
      - AZURE_STORAGE_BLOB_ENDPOINT=${AZURE_STORAGE_BLOB_ENDPOINT:-}
      - IMAGE_PLAYGROUND_BLOB_ENABLED=${IMAGE_PLAYGROUND_BLOB_ENABLED:-}
      - IMAGE_PLAYGROUND_BLOB_CONTAINER=${IMAGE_PLAYGROUND_BLOB_CONTAINER:-}
      - IMAGE_PLAYGROUND_BLOB_PUBLIC_BASE_URL=${IMAGE_PLAYGROUND_BLOB_PUBLIC_BASE_URL:-}
      - IMAGE_PLAYGROUND_BLOB_MAX_PER_USER=${IMAGE_PLAYGROUND_BLOB_MAX_PER_USER:-50}
    depends_on:
      - redis
      - postgres
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    networks:
      - new-api-network

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network

volumes:
  pg_data:

networks:
  new-api-network:
    driver: bridge
